name: Production - Atomic Deploy

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ==========================================================================
  # Integration Test Gate — re-run integration tests against this exact commit
  # Unit tests, lint, and type checks are enforced by test.yml + branch protection
  # Manual approval via GitHub Environment protection rules
  # ==========================================================================
  test-gate:
    name: Integration Test Gate
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: dev-db-integration-tests
      cancel-in-progress: false

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_TEST_HOST: localhost
      REDIS_TEST_PORT: 6399
      NODE_ENV: test
      STORAGE_CONTAINER_NAME: "user-files"
      STORAGE_CONTAINER_NAME_TEST: "user-files-test"
      AZURE_SEARCH_INDEX_NAME: "file-chunks-index"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Log in to Azure (dev credentials for test infrastructure)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_DEV }}

      - name: Fetch secrets from Key Vault
        run: |
          KV="${{ vars.DEV_KEY_VAULT_NAME }}"

          fetch() {
            local kv_name=$1 env_name=$2
            local val
            val=$(az keyvault secret show --vault-name "$KV" --name "$kv_name" --query value -o tsv)
            echo "::add-mask::$val"
            echo "$env_name=$val" >> $GITHUB_ENV
            export "$env_name=$val"
          }

          # Database
          fetch "Database-Server"                   "DATABASE_SERVER"
          fetch "Database-Name"                     "DATABASE_NAME"
          fetch "Database-User"                     "DATABASE_USER"
          fetch "Database-Password"                 "DATABASE_PASSWORD"

          # Construct DATABASE_URL for Prisma
          DB_URL="sqlserver://${DATABASE_SERVER};database=${DATABASE_NAME};user=${DATABASE_USER};password=${DATABASE_PASSWORD};encrypt=true"
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV

          # Storage
          fetch "Storage-ConnectionString"          "STORAGE_CONNECTION_STRING"

          # AI Services
          fetch "Claude-ApiKey"                     "ANTHROPIC_API_KEY"
          fetch "AZURE-OPENAI-ENDPOINT"             "AZURE_OPENAI_ENDPOINT"
          fetch "AZURE-OPENAI-KEY"                  "AZURE_OPENAI_KEY"
          fetch "AZURE-OPENAI-EMBEDDING-DEPLOYMENT" "AZURE_OPENAI_EMBEDDING_DEPLOYMENT"
          fetch "AZURE-SEARCH-ENDPOINT"             "AZURE_SEARCH_ENDPOINT"
          fetch "AZURE-SEARCH-KEY"                  "AZURE_SEARCH_KEY"
          fetch "AZURE-VISION-ENDPOINT"             "AZURE_VISION_ENDPOINT"
          fetch "AZURE-VISION-KEY"                  "AZURE_VISION_KEY"
          fetch "COHERE-ENDPOINT"                   "COHERE_ENDPOINT"
          fetch "COHERE-API-KEY"                    "COHERE_API_KEY"

          # Security
          fetch "ENCRYPTION-KEY"                    "ENCRYPTION_KEY"
          fetch "SESSION-SECRET"                    "SESSION_SECRET"

          echo "All secrets fetched from Key Vault ($KV)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Wait for Redis
        run: |
          for i in {1..30}; do
            if node -e "const net = require('net'); const s = net.createConnection(6399, 'localhost'); s.on('connect', () => process.exit(0)); s.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 1000);" 2>/dev/null; then
              echo "Redis is ready!"
              break
            fi
            sleep 1
          done

      - name: Run database migrations
        working-directory: backend
        run: |
          set +e
          MIGRATE_OUTPUT=$(npx prisma migrate deploy 2>&1)
          MIGRATE_EXIT=$?
          set -e
          echo "$MIGRATE_OUTPUT"
          if [ $MIGRATE_EXIT -ne 0 ]; then
            if echo "$MIGRATE_OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: DB has schema but no migration history. Baselining..."
              npx prisma migrate resolve --applied "20260317162456_initial_schema"
              echo "✅ Baseline applied. Running migrate deploy..."
              npx prisma migrate deploy
            else
              echo "❌ Migration failed for unexpected reason."
              exit $MIGRATE_EXIT
            fi
          fi

      - name: Backend integration tests
        working-directory: backend
        run: npm run test:integration

  # ==========================================================================
  # Build Docker images (parallel)
  # ==========================================================================
  build-backend-image:
    name: Build Backend Image
    runs-on: ubuntu-latest
    needs: [test-gate]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.BACKEND_IMAGE }}:prod-latest
          cache-from: type=gha,scope=prod-backend
          cache-to: type=gha,mode=max,scope=prod-backend,ignore-error=true

  build-frontend-image:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    needs: [test-gate]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Get Backend URL
        id: get_backend_url
        run: |
          echo "api_url=https://${{ vars.BACKEND_DOMAIN }}" >> $GITHUB_OUTPUT
          echo "ws_url=wss://${{ vars.BACKEND_DOMAIN }}" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ steps.get_backend_url.outputs.api_url }}
            NEXT_PUBLIC_WS_URL=${{ steps.get_backend_url.outputs.ws_url }}
            NEXT_PUBLIC_ENV=production
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.FRONTEND_IMAGE }}:prod-latest
          cache-from: type=gha,scope=prod-frontend
          cache-to: type=gha,mode=max,scope=prod-frontend,ignore-error=true

  # ==========================================================================
  # Database migration
  # ==========================================================================
  migrate-database:
    name: Migrate Database
    runs-on: ubuntu-latest
    needs: [build-backend-image, build-frontend-image]
    timeout-minutes: 10
    environment: production

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch database credentials from Key Vault
        run: |
          KV="${{ vars.KEY_VAULT_NAME }}"

          fetch() {
            local kv_name=$1 env_name=$2
            local val
            val=$(az keyvault secret show --vault-name "$KV" --name "$kv_name" --query value -o tsv)
            echo "::add-mask::$val"
            echo "$env_name=$val" >> $GITHUB_ENV
          }

          fetch "Database-Server"    "DATABASE_SERVER"
          fetch "Database-Name"      "DATABASE_NAME"
          fetch "Database-User"      "DATABASE_USER"
          fetch "Database-Password"  "DATABASE_PASSWORD"

          echo "✅ Database credentials fetched from $KV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Verify migration status
        working-directory: backend
        run: npx prisma migrate status

      - name: Verify database constraints
        working-directory: backend
        run: npx tsx scripts/database/verify-constraints.ts --strict --json

  # ==========================================================================
  # Deploy new revisions at 0% traffic (blue-green)
  # ==========================================================================
  deploy-containers:
    name: Deploy Containers
    runs-on: ubuntu-latest
    needs: [migrate-database]
    environment: production
    outputs:
      backend-old-revision: ${{ steps.record_revisions.outputs.backend_old }}
      frontend-old-revision: ${{ steps.record_revisions.outputs.frontend_old }}
      backend-new-revision: ${{ steps.deploy_backend.outputs.new_revision }}
      frontend-new-revision: ${{ steps.deploy_frontend.outputs.new_revision }}
      backend-new-fqdn: ${{ steps.deploy_backend.outputs.new_fqdn }}
      frontend-new-fqdn: ${{ steps.deploy_frontend.outputs.new_fqdn }}

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Record current active revisions (for rollback)
        id: record_revisions
        run: |
          BACKEND_OLD=$(az containerapp revision list \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv 2>/dev/null || echo "")
          FRONTEND_OLD=$(az containerapp revision list \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv 2>/dev/null || echo "")

          echo "backend_old=$BACKEND_OLD" >> $GITHUB_OUTPUT
          echo "frontend_old=$FRONTEND_OLD" >> $GITHUB_OUTPUT
          echo "Previous backend revision: $BACKEND_OLD"
          echo "Previous frontend revision: $FRONTEND_OLD"

      - name: Deploy backend (0% traffic)
        id: deploy_backend
        run: |
          # Custom domains from GitHub Environment variables
          FRONTEND_URL="https://${{ vars.FRONTEND_DOMAIN }}"
          CORS_ORIGIN="https://${{ vars.FRONTEND_DOMAIN }},https://www.${{ vars.FRONTEND_DOMAIN }}"
          # Also allow Azure FQDN for health checks / internal traffic
          FRONTEND_FQDN=$(az containerapp show \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv 2>/dev/null || echo "")
          if [ -n "$FRONTEND_FQDN" ]; then
            CORS_ORIGIN="${CORS_ORIGIN},https://${FRONTEND_FQDN}"
          fi

          BACKEND_REDIRECT_URI="https://${{ vars.BACKEND_DOMAIN }}/api/auth/callback"

          az containerapp update \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.BACKEND_IMAGE }}:${{ github.sha }} \
            --revision-suffix sha-${GITHUB_SHA::8} \
            --set-env-vars \
              NODE_ENV=production \
              PORT=3001 \
              DATABASE_CONNECTION_STRING=secretref:sql-conn-string \
              DATABASE_SERVER=secretref:database-server \
              DATABASE_NAME=secretref:database-name \
              DATABASE_USER=secretref:database-user \
              DATABASE_PASSWORD=secretref:database-password \
              REDIS_CONNECTION_STRING=secretref:redis-conn-string \
              ANTHROPIC_API_KEY=secretref:anthropic-api-key \
              ANTHROPIC_MODEL=${{ vars.ANTHROPIC_MODEL }} \
              BC_TENANT_ID=secretref:bc-tenant-id \
              BC_CLIENT_ID=secretref:bc-client-id \
              BC_CLIENT_SECRET=secretref:bc-client-secret \
              BC_API_URL=https://api.businesscentral.dynamics.com/v2.0 \
              BC_ENVIRONMENT=production \
              STORAGE_CONNECTION_STRING=secretref:stor-conn-string \
              STORAGE_CONTAINER_NAME=user-files \
              APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-conn \
              APPLICATIONINSIGHTS_ENABLED=true \
              APPLICATIONINSIGHTS_SAMPLING_PERCENTAGE=50 \
              SESSION_SECRET=secretref:session-secret \
              ENCRYPTION_KEY=secretref:encryption-key \
              MICROSOFT_CLIENT_ID=secretref:microsoft-client-id \
              MICROSOFT_CLIENT_SECRET=secretref:ms-client-secret \
              MICROSOFT_TENANT_ID=secretref:microsoft-tenant-id \
              MICROSOFT_REDIRECT_URI=$BACKEND_REDIRECT_URI \
              AZURE_OPENAI_ENDPOINT=secretref:openai-endpoint \
              AZURE_OPENAI_KEY=secretref:azure-openai-key \
              AZURE_OPENAI_EMBEDDING_DEPLOYMENT=text-embedding-3-small \
              AZURE_SEARCH_ENDPOINT=secretref:search-endpoint \
              AZURE_SEARCH_KEY=secretref:azure-search-key \
              AZURE_SEARCH_INDEX_NAME=file-chunks-index \
              AZURE_VISION_ENDPOINT=secretref:vision-endpoint \
              AZURE_VISION_KEY=secretref:azure-vision-key \
              AZURE_DI_ENDPOINT=secretref:azure-di-endpoint \
              AZURE_DI_KEY=secretref:azure-di-key \
              AZURE_AUDIO_ENDPOINT=secretref:azure-audio-endpoint \
              AZURE_AUDIO_KEY=secretref:azure-audio-key \
              FRONTEND_URL=$FRONTEND_URL \
              CORS_ORIGIN=$CORS_ORIGIN \
              LOG_LEVEL=info \
              ENABLE_PROMPT_CACHING=true \
              ENABLE_EXTENDED_THINKING=true \
              MAX_CONTEXT_TOKENS=100000 \
              QUEUE_FILE_PROCESSING_CONCURRENCY=5 \
              QUEUE_FILE_CHUNKING_CONCURRENCY=3 \
              QUEUE_EMBEDDING_CONCURRENCY=3 \
              GRAPH_WEBHOOK_BASE_URL=secretref:graph-webhook-url \
              SYNC_POLLING_INTERVAL_MINUTES=30 \
              SUBSCRIPTION_RENEWAL_BUFFER_HOURS=48 \
              SUBSCRIPTION_MAX_DURATION_DAYS=29 \
              COHERE_ENDPOINT=secretref:cohere-endpoint \
              COHERE_API_KEY=secretref:cohere-api-key \
              COHERE_VECTORIZER_ENDPOINT=secretref:cohere-vectorizer-endpoint \
              COHERE_VECTORIZER_KEY=secretref:cohere-vectorizer-key \
              COOKIE_DOMAIN=secretref:cookie-domain

          # Get the new revision name and its dedicated FQDN for health checks
          NEW_REV=$(az containerapp revision list \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "sort_by([],&properties.createdTime)[-1].name" -o tsv)
          NEW_FQDN=$(az containerapp show \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.latestRevisionFqdn -o tsv)
          echo "new_revision=$NEW_REV" >> $GITHUB_OUTPUT
          echo "new_fqdn=$NEW_FQDN" >> $GITHUB_OUTPUT
          echo "New backend revision: $NEW_REV"
          echo "New backend revision FQDN: $NEW_FQDN"

      - name: Deploy frontend (0% traffic)
        id: deploy_frontend
        run: |
          az containerapp update \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/${{ vars.FRONTEND_IMAGE }}:${{ github.sha }} \
            --revision-suffix sha-${GITHUB_SHA::8}

          # Get the new revision name and its dedicated FQDN for health checks
          NEW_REV=$(az containerapp revision list \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "sort_by([],&properties.createdTime)[-1].name" -o tsv)
          NEW_FQDN=$(az containerapp show \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.latestRevisionFqdn -o tsv)
          echo "new_revision=$NEW_REV" >> $GITHUB_OUTPUT
          echo "new_fqdn=$NEW_FQDN" >> $GITHUB_OUTPUT
          echo "New frontend revision: $NEW_REV"
          echo "New frontend revision FQDN: $NEW_FQDN"

  # ==========================================================================
  # Health checks on new revisions (using revision-specific FQDNs, not main FQDN)
  # ==========================================================================
  health-checks:
    name: Health Checks
    runs-on: ubuntu-latest
    needs: [deploy-containers]
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Wait for revisions to provision
        run: |
          echo "Waiting for new revisions to start..."
          MAX_WAIT=120
          INTERVAL=10
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            BACKEND_STATE=$(az containerapp revision show \
              --name ${{ vars.BACKEND_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --revision "${{ needs.deploy-containers.outputs.backend-new-revision }}" \
              --query properties.runningState -o tsv 2>/dev/null || echo "unknown")

            FRONTEND_STATE=$(az containerapp revision show \
              --name ${{ vars.FRONTEND_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --revision "${{ needs.deploy-containers.outputs.frontend-new-revision }}" \
              --query properties.runningState -o tsv 2>/dev/null || echo "unknown")

            echo "Backend: $BACKEND_STATE | Frontend: $FRONTEND_STATE (${ELAPSED}s)"

            if [ "$BACKEND_STATE" = "Running" ] && [ "$FRONTEND_STATE" = "Running" ]; then
              echo "Both revisions are running!"
              break
            fi

            if [ "$BACKEND_STATE" = "Failed" ] || [ "$FRONTEND_STATE" = "Failed" ]; then
              echo "A revision has failed to start"
              echo "Backend: $BACKEND_STATE, Frontend: $FRONTEND_STATE"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "Revisions did not reach Running state within ${MAX_WAIT}s"
            exit 1
          fi

      - name: Backend liveness check (revision FQDN)
        run: |
          REVISION_FQDN="${{ needs.deploy-containers.outputs.backend-new-fqdn }}"
          echo "Checking backend liveness at https://$REVISION_FQDN/health/liveness"

          MAX_RETRIES=5
          RETRY_DELAY=15
          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" --max-time 30 "https://$REVISION_FQDN/health/liveness" 2>&1)
            HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d':' -f2)
            BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")

            if echo "$BODY" | jq -e '.status == "alive"' > /dev/null 2>&1; then
              echo "Backend liveness check passed!"
              break
            fi

            echo "Attempt $i/$MAX_RETRIES failed (HTTP $HTTP_CODE)"
            if [ $i -eq $MAX_RETRIES ]; then
              echo "Backend liveness check failed after $MAX_RETRIES attempts"
              exit 1
            fi
            sleep $RETRY_DELAY
          done

      - name: Backend readiness check (revision FQDN)
        run: |
          REVISION_FQDN="${{ needs.deploy-containers.outputs.backend-new-fqdn }}"
          echo "Checking backend readiness at https://$REVISION_FQDN/health"

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" --max-time 30 "https://$REVISION_FQDN/health" 2>&1)
            HTTP_CODE=$(echo "$RESPONSE" | grep "HTTP_CODE:" | cut -d':' -f2)
            BODY=$(echo "$RESPONSE" | grep -v "HTTP_CODE:")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Backend readiness check passed!"
              echo "Response: $BODY"
              break
            fi

            echo "Attempt $i/$MAX_RETRIES failed (HTTP $HTTP_CODE)"
            if [ $i -eq $MAX_RETRIES ]; then
              echo "Backend readiness check failed"
              exit 1
            fi
            sleep 15
          done

      - name: Frontend health check (revision FQDN)
        run: |
          REVISION_FQDN="${{ needs.deploy-containers.outputs.frontend-new-fqdn }}"
          echo "Checking frontend at https://$REVISION_FQDN"

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://$REVISION_FQDN" 2>&1)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend health check passed!"
              break
            fi
            echo "Attempt $i/$MAX_RETRIES failed (HTTP $HTTP_CODE)"
            if [ $i -eq $MAX_RETRIES ]; then
              echo "Frontend health check failed"
              exit 1
            fi
            sleep 15
          done

  # ==========================================================================
  # Shift 100% traffic to new revisions
  # ==========================================================================
  finalize-traffic:
    name: Finalize Traffic
    runs-on: ubuntu-latest
    needs: [health-checks, deploy-containers]
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Shift backend traffic to new revision
        run: |
          az containerapp ingress traffic set \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --revision-weight \
              ${{ needs.deploy-containers.outputs.backend-new-revision }}=100

      - name: Shift frontend traffic to new revision
        run: |
          az containerapp ingress traffic set \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --revision-weight \
              ${{ needs.deploy-containers.outputs.frontend-new-revision }}=100

      - name: Deactivate old revisions
        if: needs.deploy-containers.outputs.backend-old-revision != ''
        run: |
          # Deactivate old backend revision
          if [ -n "${{ needs.deploy-containers.outputs.backend-old-revision }}" ]; then
            az containerapp revision deactivate \
              --name ${{ vars.BACKEND_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --revision "${{ needs.deploy-containers.outputs.backend-old-revision }}" || true
          fi

          # Deactivate old frontend revision
          if [ -n "${{ needs.deploy-containers.outputs.frontend-old-revision }}" ]; then
            az containerapp revision deactivate \
              --name ${{ vars.FRONTEND_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --revision "${{ needs.deploy-containers.outputs.frontend-old-revision }}" || true
          fi

      - name: Deployment Summary
        run: |
          echo "### Production Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Backend revision:** \`${{ needs.deploy-containers.outputs.backend-new-revision }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend revision:** \`${{ needs.deploy-containers.outputs.frontend-new-revision }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          FRONTEND_FQDN=$(az containerapp show \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "**Backend URL:** https://$BACKEND_FQDN" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend URL:** https://$FRONTEND_FQDN" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Rollback on failure — revert traffic to previous revisions
  # ==========================================================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [deploy-containers, health-checks, finalize-traffic]
    if: failure() && needs.deploy-containers.outputs.backend-old-revision != ''
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Revert backend traffic
        if: needs.deploy-containers.outputs.backend-old-revision != ''
        run: |
          az containerapp ingress traffic set \
            --name ${{ vars.BACKEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --revision-weight \
              ${{ needs.deploy-containers.outputs.backend-old-revision }}=100 || true

      - name: Revert frontend traffic
        if: needs.deploy-containers.outputs.frontend-old-revision != ''
        run: |
          az containerapp ingress traffic set \
            --name ${{ vars.FRONTEND_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --revision-weight \
              ${{ needs.deploy-containers.outputs.frontend-old-revision }}=100 || true

      - name: Deactivate failed revisions
        run: |
          # Deactivate failed backend revision
          if [ -n "${{ needs.deploy-containers.outputs.backend-new-revision }}" ]; then
            az containerapp revision deactivate \
              --name ${{ vars.BACKEND_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --revision "${{ needs.deploy-containers.outputs.backend-new-revision }}" || true
          fi

          # Deactivate failed frontend revision
          if [ -n "${{ needs.deploy-containers.outputs.frontend-new-revision }}" ]; then
            az containerapp revision deactivate \
              --name ${{ vars.FRONTEND_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --revision "${{ needs.deploy-containers.outputs.frontend-new-revision }}" || true
          fi

      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production deployment failed — ${context.sha.substring(0, 8)}`,
              body: [
                `## Production Deployment Failure`,
                ``,
                `**Commit:** \`${context.sha}\``,
                `**Workflow:** [Run #${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                `**Time:** ${new Date().toISOString()}`,
                ``,
                `### Rollback Status`,
                `Traffic was reverted to previous revisions:`,
                `- Backend: \`${{ needs.deploy-containers.outputs.backend-old-revision }}\``,
                `- Frontend: \`${{ needs.deploy-containers.outputs.frontend-old-revision }}\``,
                ``,
                `### Action Required`,
                `1. Check workflow logs for failure details`,
                `2. If migration was applied, assess DB compatibility with old code`,
                `3. Fix the issue and create a new PR to \`production\``,
              ].join('\n'),
              labels: ['production', 'deployment-failure']
            });

      - name: Rollback Summary
        run: |
          echo "### Production Deployment ROLLED BACK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Traffic reverted to previous revisions." >> $GITHUB_STEP_SUMMARY
          echo "**Backend:** \`${{ needs.deploy-containers.outputs.backend-old-revision }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend:** \`${{ needs.deploy-containers.outputs.frontend-old-revision }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A GitHub issue has been created to track this failure." >> $GITHUB_STEP_SUMMARY
