name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop, production]

jobs:
  # ==========================================================================
  # Type verification runs first - ensures shared types are compatible
  # ==========================================================================
  type-verification:
    name: Type Verification (Shared Types)
    runs-on: ubuntu-latest
    environment: development

    env:
      # Dummy URL for prisma generate (only generates client, no DB connection)
      DATABASE_URL: "sqlserver://localhost;database=dummy;user=sa;password=dummy;encrypt=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Verify types across monorepo
        run: npm run verify:types

  # ==========================================================================
  # Backend Unit Tests
  # ==========================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [type-verification]
    environment: development

    env:
      # Dummy URL for prisma generate (unit tests mock the DB)
      DATABASE_URL: "sqlserver://localhost;database=dummy;user=sa;password=dummy;encrypt=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run linter
        working-directory: backend
        run: npm run lint

      - name: Run type check
        working-directory: backend
        run: npm run type-check

      - name: Run unit tests
        working-directory: backend
        run: npm run test:unit

      - name: Run coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ==========================================================================
  # Backend Integration Tests (requires Redis + Azure SQL)
  # ==========================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests]
    environment: development

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_TEST_HOST: localhost
      REDIS_TEST_PORT: 6399
      DATABASE_SERVER: ${{ secrets.DATABASE_SERVER }}
      DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
      DATABASE_USER: ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
      DATABASE_URL: "sqlserver://${{ secrets.DATABASE_SERVER }};database=${{ secrets.DATABASE_NAME }};user=${{ secrets.DATABASE_USER }};password=${{ secrets.DATABASE_PASSWORD }};encrypt=true"
      STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
      STORAGE_CONTAINER_NAME: "user-files"
      STORAGE_CONTAINER_NAME_TEST: "user-files-test"
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Wait for Redis
        run: |
          echo "Waiting for Redis to be ready..."
          for i in {1..30}; do
            if node -e "const net = require('net'); const s = net.createConnection(6399, 'localhost'); s.on('connect', () => process.exit(0)); s.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 1000);" 2>/dev/null; then
              echo "Redis is ready!"
              break
            fi
            echo "Attempt $i/30 - Redis not ready, waiting..."
            sleep 1
          done

      - name: Run database migrations
        working-directory: backend
        run: |
          MIGRATE_OUTPUT=$(npx prisma migrate deploy 2>&1)
          MIGRATE_EXIT=$?
          echo "$MIGRATE_OUTPUT"
          if [ $MIGRATE_EXIT -ne 0 ]; then
            if echo "$MIGRATE_OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: DB has schema but no migration history. Baselining..."
              npx prisma migrate resolve --applied "20260317162456_initial_schema"
              echo "✅ Baseline applied. Running migrate deploy..."
              npx prisma migrate deploy
            else
              echo "❌ Migration failed for unexpected reason."
              exit $MIGRATE_EXIT
            fi
          fi

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: backend/coverage/
          retention-days: 7

  # ==========================================================================
  # Frontend Tests
  # ==========================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [type-verification]
    environment: development

    env:
      # Dummy URL for prisma generate (frontend tests don't use DB)
      DATABASE_URL: "sqlserver://localhost;database=dummy;user=sa;password=dummy;encrypt=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run type check
        working-directory: frontend
        run: npm run type-check

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Run coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
