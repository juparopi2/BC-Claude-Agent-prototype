name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ==========================================================================
  # Type verification runs first - ensures shared types are compatible
  # ==========================================================================
  type-verification:
    name: Type Verification (Shared Types)
    runs-on: ubuntu-latest
    environment: development

    env:
      # Dummy URL for prisma generate (only generates client, no DB connection)
      DATABASE_URL: "sqlserver://localhost;database=dummy;user=sa;password=dummy;encrypt=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Verify types across monorepo
        run: npm run verify:types

  # ==========================================================================
  # Migration Safety — scan for destructive SQL in new migrations
  # ==========================================================================
  migration-safety:
    name: Migration Safety Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for destructive migration SQL
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash backend/scripts/database/check-destructive-migrations.sh

  # ==========================================================================
  # Backend Unit Tests
  # ==========================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [type-verification]
    environment: development

    env:
      # Dummy URL for prisma generate (unit tests mock the DB)
      DATABASE_URL: "sqlserver://localhost;database=dummy;user=sa;password=dummy;encrypt=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run linter
        working-directory: backend
        run: npm run lint

      - name: Run type check
        working-directory: backend
        run: npm run type-check

      - name: Run unit tests
        working-directory: backend
        run: npm run test:unit

      - name: Run coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ==========================================================================
  # Backend Integration Tests (requires Redis + Azure SQL)
  # ==========================================================================
  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-tests]
    environment: development
    concurrency:
      group: dev-db-integration-tests
      cancel-in-progress: false

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6399:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      REDIS_TEST_HOST: localhost
      REDIS_TEST_PORT: 6399
      NODE_ENV: test
      STORAGE_CONTAINER_NAME: "user-files"
      STORAGE_CONTAINER_NAME_TEST: "user-files-test"
      AZURE_SEARCH_INDEX_NAME: "file-chunks-index-v2"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Fetch secrets from Key Vault
        run: |
          KV="${{ vars.KEY_VAULT_NAME }}"

          fetch() {
            local kv_name=$1 env_name=$2
            local val
            val=$(az keyvault secret show --vault-name "$KV" --name "$kv_name" --query value -o tsv)
            echo "::add-mask::$val"
            echo "$env_name=$val" >> $GITHUB_ENV
            export "$env_name=$val"
          }

          # Database
          fetch "Database-Server"                   "DATABASE_SERVER"
          fetch "Database-Name"                     "DATABASE_NAME"
          fetch "Database-User"                     "DATABASE_USER"
          fetch "Database-Password"                 "DATABASE_PASSWORD"

          # Construct DATABASE_URL for Prisma
          DB_URL="sqlserver://${DATABASE_SERVER};database=${DATABASE_NAME};user=${DATABASE_USER};password=${DATABASE_PASSWORD};encrypt=true"
          echo "::add-mask::$DB_URL"
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV

          # Storage
          fetch "Storage-ConnectionString"          "STORAGE_CONNECTION_STRING"

          # AI Services
          fetch "Claude-ApiKey"                     "ANTHROPIC_API_KEY"
          fetch "AZURE-OPENAI-ENDPOINT"             "AZURE_OPENAI_ENDPOINT"
          fetch "AZURE-OPENAI-KEY"                  "AZURE_OPENAI_KEY"
          fetch "AZURE-SEARCH-ENDPOINT"             "AZURE_SEARCH_ENDPOINT"
          fetch "AZURE-SEARCH-KEY"                  "AZURE_SEARCH_KEY"
          fetch "AZURE-VISION-ENDPOINT"             "AZURE_VISION_ENDPOINT"
          fetch "AZURE-VISION-KEY"                  "AZURE_VISION_KEY"
          fetch "COHERE-ENDPOINT"                   "COHERE_ENDPOINT"
          fetch "COHERE-API-KEY"                    "COHERE_API_KEY"

          # Security
          fetch "ENCRYPTION-KEY"                    "ENCRYPTION_KEY"
          fetch "SESSION-SECRET"                    "SESSION_SECRET"

          echo "✅ All secrets fetched from Key Vault ($KV)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Wait for Redis
        run: |
          echo "Waiting for Redis to be ready..."
          for i in {1..30}; do
            if node -e "const net = require('net'); const s = net.createConnection(6399, 'localhost'); s.on('connect', () => process.exit(0)); s.on('error', () => process.exit(1)); setTimeout(() => process.exit(1), 1000);" 2>/dev/null; then
              echo "Redis is ready!"
              break
            fi
            echo "Attempt $i/30 - Redis not ready, waiting..."
            sleep 1
          done

      - name: Run database migrations
        working-directory: backend
        run: |
          set +e
          MIGRATE_OUTPUT=$(npx prisma migrate deploy 2>&1)
          MIGRATE_EXIT=$?
          set -e
          echo "$MIGRATE_OUTPUT"
          if [ $MIGRATE_EXIT -ne 0 ]; then
            if echo "$MIGRATE_OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: DB has schema but no migration history. Baselining..."
              npx prisma migrate resolve --applied "20260317162456_initial_schema"
              echo "✅ Baseline applied. Running migrate deploy..."
              npx prisma migrate deploy
            else
              echo "❌ Migration failed for unexpected reason."
              exit $MIGRATE_EXIT
            fi
          fi

      - name: Verify database constraints
        working-directory: backend
        run: npx tsx scripts/database/verify-constraints.ts --strict --json

      - name: Check constraints.sql freshness
        working-directory: backend
        run: npx tsx scripts/database/export-constraints.ts --diff

      - name: Warn if migration changed without constraints.sql
        if: github.event_name == 'pull_request'
        run: |
          MIGRATION_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- backend/prisma/migrations/ | wc -l)
          CONSTRAINTS_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- backend/prisma/constraints.sql | wc -l)
          if [ "$MIGRATION_CHANGED" -gt 0 ] && [ "$CONSTRAINTS_CHANGED" -eq 0 ]; then
            echo "::warning::Migration files changed but constraints.sql was not updated. Review if constraint changes are needed."
          fi

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: backend/coverage/
          retention-days: 7

  # ==========================================================================
  # Frontend Tests
  # ==========================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [type-verification]
    environment: development

    env:
      # Dummy URL for prisma generate (frontend tests don't use DB)
      DATABASE_URL: "sqlserver://localhost;database=dummy;user=sa;password=dummy;encrypt=true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install all dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Run linter
        working-directory: frontend
        run: npm run lint

      - name: Run type check
        working-directory: frontend
        run: npm run type-check

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Run coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
